<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PG & Rooms | Stay100%</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Layout Structure */
        .main-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        
        /* Desktop Sidebar Filters */
        .desktop-filters-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .content-area {
            flex-grow: 1;
            width: 100%;
        }

        /* Filter UI Components */
        .filter-group {
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
        }
        .filter-group:last-child {
            border-bottom: none;
        }
        .filter-group h4 {
            margin-bottom: 10px;
            font-size: 15px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }
        .filter-options input[type="checkbox"], 
        .filter-options input[type="radio"] {
            accent-color: #ff385c; /* Brand color choice */
            width: 16px;
            height: 16px;
        }
        .filter-select, .filter-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        /* Active/Selected Chips Section */
        .active-filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .filter-chip {
            background: #f0f2f5;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4a5568;
        }
        .filter-chip i {
            cursor: pointer;
            color: #a0aec0;
        }
        .filter-chip i:hover {
            color: #e53e3e;
        }

        /* Clear All Button */
        .clear-all-btn {
            background: none;
            border: none;
            color: #ff385c;
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        /* Native Listings Grid */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 15px 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .property-card { 
            transition: transform 0.2s ease, box-shadow 0.2s ease; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        /* Slider Systems */
        .banner-slider-container {
            margin: 20px 0 25px 0;
            position: relative;
            width: 100%;
        }
        .slider-viewport-wrapper {
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            background: #e2e8f0;
            position: relative;
            width: 100%;
        }
        .dynamic-slides-track {
            display: block;
            width: 100%;
            position: relative;
        }
        .dynamic-banner-slide {
            display: none;
            width: 100%;
            text-decoration: none;
            border-radius: 16px;
            overflow: hidden;
            box-sizing: border-box;
        }
        .dynamic-banner-slide.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Responsive Breakpoint for Mobile/Tablet */
        @media (max-width: 992px) {
            .desktop-filters-sidebar {
                display: none; /* Hide sidebar on mobile/tablet */
            }
            .main-layout {
                flex-direction: column;
            }
            #filter-btn {
                display: inline-block !important; /* Show mobile filter trigger button */
            }
        }
        @media (min-width: 993px) {
            #filter-btn {
                display: none !important; /* Hide mobile filter trigger button on desktop */
            }
        }
    </style>
</head>
<body>

    <div id="dynamic-header-container"></div>

    <main class="container">
        
        <section class="search-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Search by area, location or PG name...">
                <button id="voice-search-btn" class="voice-btn" title="Voice Search">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button id="filter-btn" class="voice-btn" style="margin-right: 5px;" title="Filters">
                    <i class="fa-solid fa-sliders"></i>
                </button>
            </div>
        </section>

        <section class="categories-section">
            <div class="category-grid">
                <div class="category-card active" data-category="all">
                    <i class="fa-solid fa-house-user"></i>
                    <span>All Spaces</span>
                </div>
                <div class="category-card" data-category="pg">
                    <i class="fa-solid fa-hotel"></i>
                    <span>Premium PGs</span>
                </div>
                <div class="category-card" data-category="flat">
                    <i class="fa-solid fa-building"></i>
                    <span>Luxury Flats</span>
                </div>
                <div class="category-card" data-category="room">
                    <i class="fa-solid fa-bed"></i>
                    <span>Private Rooms</span>
                </div>
            </div>
        </section>

        <section class="banner-slider-container">
            <div class="slider-viewport-wrapper">
                <div class="dynamic-slides-track" id="dynamic-banners-container"></div>
            </div>
        </section>

        <div class="main-layout">
            
            <aside class="desktop-filters-sidebar">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3>Filters Matrix</h3>
                    <button type="button" class="clear-all-btn" onclick="clearAllFilters()">Clear All</button>
                </div>

                <div class="active-filters-container" id="desktop-active-chips">
                    </div>

                <div class="filter-group">
                    <h4>Budget (Max)</h4>
                    <select class="filter-select" id="filter-budget">
                        <option value="">Any Budget</option>
                        <option value="5000">Under ₹5,000</option>
                        <option value="10000">Under ₹10,000</option>
                        <option value="15000">Under ₹15,000</option>
                        <option value="20000">Under ₹20,000</option>
                    </select>
                </div>

                <div class="filter-group">
                    <h4>Gender</h4>
                    <div class="filter-options">
                        <label><input type="radio" name="desktop-gender" value="boys"> Boys</label>
                        <label><input type="radio" name="desktop-gender" value="girls"> Girls</label>
                        <label><input type="radio" name="desktop-gender" value="unisex"> Unisex</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Locality / Area</h4>
                    <input type="text" class="filter-input" id="filter-locality" placeholder="e.g., Malviya Nagar">
                </div>

                <div class="filter-group">
                    <h4>Sharing Type</h4>
                    <div class="filter-options">
                        <label><input type="checkbox" class="filter-sharing" value="single"> Single Occupancy</label>
                        <label><input type="checkbox" class="filter-sharing" value="double"> Double Sharing</label>
                        <label><input type="checkbox" class="filter-sharing" value="triple"> Triple Sharing</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Furnishing</h4>
                    <div class="filter-options">
                        <label><input type="checkbox" class="filter-furnishing" value="unfurnished"> Unfurnished</label>
                        <label><input type="checkbox" class="filter-furnishing" value="semi-furnished"> Semi-Furnished</label>
                        <label><input type="checkbox" class="filter-furnishing" value="fully-furnished"> Fully Furnished</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Food Services</h4>
                    <div class="filter-options">
                        <label><input type="checkbox" id="filter-food" value="food-included"> Food Included (Mess)</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Nearby Hubs</h4>
                    <div class="filter-options">
                        <label><input type="checkbox" class="filter-landmark" value="near-school"> Near Schools/Colleges</label>
                        <label><input type="checkbox" class="filter-landmark" value="near-hospital"> Near Hospitals</label>
                        <label><input type="checkbox" class="filter-landmark" value="near-office"> Near Corporate Offices</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Quick Filters</h4>
                    <div class="filter-options">
                        <label><input type="checkbox" id="filter-verified" value="verified"> Verified Properties Only</label>
                        <label><input type="checkbox" id="filter-recent" value="recent"> Recently Posted</label>
                    </div>
                </div>
            </aside>

            <section class="content-area">
                <h3>Recommended Spaces</h3>
                <div class="listings-grid" id="listings-container"></div>
            </section>

        </div>
    </main>

    <div id="filter-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Filters Selection Matrix</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body" id="mobile-filter-body-container">
                </div>
            <div class="modal-footer" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                <button class="btn-mehrum w-100" onclick="applyFilters()">Apply Filters</button>
            </div>
        </div>
    </div>

    <div id="dynamic-footer-container"></div>
    <div id="dynamic-desktop-footer-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script src="header.js"></script>
    <script src="propertycardscomponants.js"></script>
    <script src="index.js"></script>
    <script type="module" src="footer.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // पॉपअप एलिमेंट बनाना
        const popup = document.createElement('div');
        popup.className = 'property-popup-bubble';
        
        popup.innerHTML = `
            <div class="popup-message-content">
                <div class="popup-avatar">
               <img src="assets/stay100.png" alt="Stay100% Logo"
                </div>
                <div class="popup-bubble-text">
                    <p>Hey! Want to grow your business?</p>
                    <a href="vendor-registration.html" class="popup-action-btn">
                        List Your Property <span class="popup-free-badge">FREE</span>
                    </a>
                </div>
                <button class="popup-close-x" onclick="this.parentElement.parentElement.classList.remove('show')">&times;</button>
            </div>
        `;
        
        document.body.appendChild(popup);

        // पॉपअप दिखाने का फंक्शन
        function triggerPopup() {
            popup.classList.add('show');
            
            // 6 सेकंड बाद धीरे से वापस ऊपर छिप जाएगा
            setTimeout(() => {
                popup.classList.remove('show');
            }, 6000); 
        }

        // 1. पेज लोड होने के 1.5 सेकंड बाद पहली बार दिखाएँ
        setTimeout(triggerPopup, 15000);

        // 2. हर 15 सेकंड में बार-बार ट्रिगर करें
        setInterval(triggerPopup, 15000);
    });
</script>
</body>
</html>
