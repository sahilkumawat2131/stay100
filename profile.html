<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - StayPremium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
     <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>
<body>

    <div id="dynamic-header-container"></div>

    <main class="profile-container">
        <aside class="profile-sidebar">
            <div class="avatar-container">
                <div class="avatar-wrapper">
                    <i class="fa-solid fa-circle-user profile-avatar-icon"></i>
                </div>
                <h2 id="display-user-name" class="user-name-title">Loading Profile...</h2>
                <div class="uid-badge">
                    <span class="uid-label">UID</span>
                    <span id="display-user-id" class="uid-value">-----------</span>
                </div>
            </div>
            
            <div class="user-meta-info">
                <div class="meta-item">
                    <div class="meta-icon-box"><i class="fa-solid fa-envelope"></i></div>
                    <div class="meta-text">
                        <label>Email Address</label>
                        <span id="display-user-email">email@staypremium.com</span>
                    </div>
                </div>
                <div class="meta-item">
                    <div class="meta-icon-box"><i class="fa-solid fa-phone"></i></div>
                    <div class="meta-text">
                        <label>Phone Number</label>
                        <span id="display-user-phone">+91 XXXXX XXXXX</span>
                    </div>
                </div>
            </div>
            
            <button id="logout-btn" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> Log Out Account
            </button>
        </aside>

        <section class="profile-content-area">
            <nav class="profile-tabs-nav" aria-label="Profile tabs">
                <button class="tab-btn active" data-target="inquiries-panel">
                    <i class="fa-solid fa-paper-plane"></i> My Inquiries
                </button>
                <button class="tab-btn" data-target="saved-panel">
                    <i class="fa-solid fa-bookmark"></i> Saved Properties
                </button>
            </nav>

            <div class="tabs-content-container">
                <div id="inquiries-panel" class="tab-panel active">
                    <div class="panel-header">
                        <h3>Recent Sent Inquiries</h3>
                        <p class="panel-subtitle">Track the communication status of your requested spaces</p>
                    </div>
                    <div id="inquiries-list-container" class="panel-list-grid">
                        <div class="panel-loader">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Fetching inquiry tracks...
                        </div>
                    </div>
                </div>

                <div id="saved-panel" class="tab-panel">
                    <div class="panel-header">
                        <h3>Your Bookmarked Spaces</h3>
                        <p class="panel-subtitle">Premium properties you have saved for future references</p>
                    </div>
                    <div id="saved-list-container" class="panel-list-grid">
                        <div class="panel-loader">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Fetching saved items...
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="dynamic-desktop-footer-container"></div>
    <div id="dynamic-footer-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="header.js"></script>
    <script type="module" src="profile.js"></script>
    <script type="module" src="footer.js"></script>

</body>
</html>
