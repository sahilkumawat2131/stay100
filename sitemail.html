<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayPremium Engine | Live Support Mail Hub</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="admin.css">
    <style>
        .mail-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
            background: var(--bg-main, #f8f9fa);
        }
        .mail-sidebar {
            background: #fff;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .mail-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mail-tabs {
            display: flex;
            background: #f1f3f5;
            padding: 5px;
            margin: 10px 15px;
            border-radius: 6px;
        }
        .mail-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            color: #666;
        }
        .mail-tab-btn.active {
            background: #fff;
            color: var(--mehrum, #800000);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .mail-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .mail-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mail-item:hover, .mail-item.active {
            background: #fdf2f2;
        }
        .mail-item h4 {
            font-size: 14px;
            margin-bottom: 4px;
            color: #333;
        }
        .mail-item p {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mail-content-area {
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .mail-box-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .compose-box {
            display: none;
        }
        .loading-spinner {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="mail-layout">
        <!-- Left Sidebar: Inbox / Sent Lists -->
        <div class="mail-sidebar">
            <div class="mail-sidebar-header">
                <h3><i class="fa-solid fa-envelope" style="color: var(--mehrum, #800000);"></i> Support Hub</h3>
                <button class="btn-small" onclick="openComposeBox()" style="background: var(--mehrum, #800000); color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;">
                    <i class="fa-solid fa-pen-to-square"></i> New
                </button>
            </div>
            
            <!-- Mail Folders Switcher -->
            <div class="mail-tabs">
                <button class="mail-tab-btn active" onclick="switchTab('inbox')" id="tab-inbox-btn">Inbox</button>
                <button class="mail-tab-btn" onclick="switchTab('sent')" id="tab-sent-btn">Sent</button>
            </div>

            <div style="padding: 0 15px 10px 15px;">
                <input type="text" id="mail-search" placeholder="Search emails..." style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;">
            </div>

            <ul class="mail-list" id="mail-list-container">
                <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Fetching live mails from supportstay100@gmail.com...</div>
            </ul>
        </div>

        <!-- Right Side: Detailed View & Direct In-App Actions -->
        <div class="mail-content-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>supportstay100@gmail.com Live Console</h2>
                <button onclick="window.location.href='admin.html'" style="padding: 8px 15px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Admin
                </button>
            </div>

            <!-- View / Reply Card -->
            <div class="mail-box-card" id="view-mail-card">
                <h3 id="detail-subject" style="margin-bottom: 10px; color: #222;">Select an email</h3>
                <p id="detail-sender" style="font-size: 13px; color: #886; margin-bottom: 20px;">From: -</p>
                <hr style="border: none; border-top: 1px solid #eee; margin-bottom: 20px;">
                <div id="detail-body" style="font-size: 14px; color: #444; line-height: 1.6; min-height: 150px; margin-bottom: 20px;">
                    Select a live thread from the sidebar to view details.
                </div>

                <!-- Direct In-App Reply Box -->
                <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee;" id="reply-container-box">
                    <h4 style="font-size: 14px; margin-bottom: 10px;"><i class="fa-solid fa-reply"></i> Direct Reply</h4>
                    <textarea id="reply-msg-text" rows="3" placeholder="Type your response here..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px;"></textarea>
                    <button type="button" id="send-reply-btn" onclick="sendDirectReply()" style="background: var(--mehrum, #800000); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                        <i class="fa-solid fa-paper-plane"></i> Send Reply Now
                    </button>
                </div>
            </div>

            <!-- Compose New Mail Card -->
            <div class="mail-box-card compose-box" id="compose-mail-card">
                <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-paper-plane"></i> Send New Email</h3>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 5px; font-weight: 600;">Recipient Email</label>
                    <input type="email" id="new-recipient" placeholder="user@example.com" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 5px; font-weight: 600;">Subject</label>
                    <input type="text" id="new-subject" placeholder="Subject line" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 5px; font-weight: 600;">Message</label>
                    <textarea id="new-body" rows="4" placeholder="Write message..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;"></textarea>
                </div>
                <button type="button" id="send-new-mail-btn" onclick="sendNewEmailAction()" style="background: var(--mehrum, #800000); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    <i class="fa-solid fa-share"></i> Send Email
                </button>
                <button type="button" onclick="closeComposeBox()" style="background: #ccc; color: #333; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 10px;">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        // Aapka Google Apps Script Web App URL yahan set hai
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8a_ppuR1WKxBprPdZooBhnb-W7rhnduA3TwZ_8OLqeqwGyQxMl8t_kHBMEkKcO7ijAA/exec";
        
        let currentTab = 'inbox';
        let activeMailData = null;
        let emailsCache = { inbox: [], sent: [] };

        window.onload = function() {
            fetchLiveMails();
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-inbox-btn').classList.toggle('active', tab === 'inbox');
            document.getElementById('tab-sent-btn').classList.toggle('active', tab === 'sent');
            renderMailList();
        }

        async function fetchLiveMails() {
            try {
                let response = await fetch(`${APPS_SCRIPT_URL}?action=getMails`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                let data = await response.json();
                emailsCache.inbox = data.inbox || [];
                emailsCache.sent = data.sent || [];
                renderMailList();
            } catch (err) {
                console.error("Error fetching live mails:", err);
                document.getElementById('mail-list-container').innerHTML = `<div style="text-align:center; padding:30px; color:red; font-size:13px;">Failed to load live mails. Check Console / Deployment.</div>`;
            }
        }

        function renderMailList() {
            const container = document.getElementById('mail-list-container');
            const list = emailsCache[currentTab];
            
            if (!list || list.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#999; font-size:13px;">No live messages found in ${currentTab}</div>`;
                return;
            }

            container.innerHTML = list.map((mail, index) => `
                <li class="mail-item" onclick="selectMail('${currentTab}', ${index})">
                    <h4>${currentTab === 'inbox' ? mail.sender : 'To: ' + mail.recipient}</h4>
                    <p>${mail.subject}</p>
                    <span style="font-size: 11px; color: #999;">${mail.date || ''}</span>
                </li>
            `).join('');
        }

        function selectMail(tab, index) {
            activeMailData = emailsCache[tab][index];
            document.getElementById('view-mail-card').style.display = 'block';
            document.getElementById('compose-mail-card').style.display = 'none';
            
            document.getElementById('detail-subject').innerText = activeMailData.subject;
            document.getElementById('detail-sender').innerText = tab === 'inbox' ? "From: " + activeMailData.sender : "To: " + activeMailData.recipient;
            document.getElementById('detail-body').innerText = activeMailData.body;
            
            document.getElementById('reply-container-box').style.display = tab === 'inbox' ? 'block' : 'none';
        }

        function openComposeBox() {
            document.getElementById('view-mail-card').style.display = 'none';
            document.getElementById('compose-mail-card').style.display = 'block';
        }

        function closeComposeBox() {
            document.getElementById('compose-mail-card').style.display = 'none';
            document.getElementById('view-mail-card').style.display = 'block';
        }

        async function sendDirectReply() {
            const text = document.getElementById('reply-msg-text').value;
            if (!text.trim() || !activeMailData) {
                alert("Please write a reply message.");
                return;
            }
            
            const recipientEmail = activeMailData.sender.match(/<(.+?)>/) ? activeMailData.sender.match(/<(.+?)>/)[1] : activeMailData.sender;
            const subjectLine = "Re: " + activeMailData.subject;

            let btn = document.getElementById('send-reply-btn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Sending...`;
            
            try {
                let res = await fetch(`${APPS_SCRIPT_URL}?action=sendMail&to=${encodeURIComponent(recipientEmail)}&subject=${encodeURIComponent(subjectLine)}&body=${encodeURIComponent(text)}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                let result = await res.json();
                if(result.status === "success") {
                    alert("Reply sent successfully!");
                    document.getElementById('reply-msg-text').value = '';
                    fetchLiveMails();
                } else {
                    alert("Failed to send.");
                }
            } catch(e) {
                alert("Error sending mail.");
            }
            btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Send Reply Now`;
        }

        async function sendNewEmailAction() {
            const recipient = document.getElementById('new-recipient').value;
            const subject = document.getElementById('new-subject').value;
            const body = document.getElementById('new-body').value;

            if (!recipient || !subject || !body) {
                alert("Please fill all fields.");
                return;
            }

            let btn = document.getElementById('send-new-mail-btn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Sending...`;

            try {
                let res = await fetch(`${APPS_SCRIPT_URL}?action=sendMail&to=${encodeURIComponent(recipient)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                let result = await res.json();
                if(result.status === "success") {
                    alert("Email sent successfully!");
                    document.getElementById('new-recipient').value = '';
                    document.getElementById('new-subject').value = '';
                    document.getElementById('new-body').value = '';
                    closeComposeBox();
                    fetchLiveMails();
                } else {
                    alert("Failed to send.");
                }
            } catch(e) {
                alert("Error sending mail.");
            }
            btn.innerHTML = `<i class="fa-solid fa-share"></i> Send Email`;
        }
    </script>
</body>
</html>
