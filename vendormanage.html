<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayPremium Engine | Vendor Management Matrix</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="admin.css">
    <style>
        .vendor-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .vendor-item-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .vendor-item-card.blocked-vendor {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.01);
        }
        .vendor-header-flex {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 15px;
        }
        .vendor-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }
        .vendor-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .vendor-info p {
            font-size: 12px;
            color: var(--text-muted);
        }
        .vendor-meta-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .vendor-meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .vendor-meta-row:last-child {
            margin-bottom: 0;
        }
        .badge-status {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-active { background: rgba(16,185,129,0.1); color: #10b981; }
        .badge-blocked { background: rgba(239,68,68,0.1); color: #ef4444; }
        
        .vendor-actions-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-action {
            flex: 1;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-block-action { background: #fee2e2; color: #dc2626; }
        .btn-block-action.unblock { background: #d1fae5; color: #059669; }
        .btn-whatsapp { background: #dcfce7; color: #16a34a; }
        .btn-email { background: #e0f2fe; color: #0284c7; }
        
        /* Modal for Property Listings & Dates */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <h2>Vendor Matrix</h2>
        <i class="fa-solid fa-user-shield" style="color: var(--mehrum); font-size: 20px;"></i>
    </div>

    <!-- Center Notification Toast -->
    <div id="center-toast" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

    <div class="admin-layout">
        <!-- Sidebar Navigation (Desktop) -->
        <aside class="sidebar" id="sidebarNav">
            <div class="sidebar-brand">
                <h2><i class="fa-solid fa-shield-halved"></i> Engine Panel</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item" onclick="window.location.href='admin.html'">
                    <button><i class="fa-solid fa-circle-plus"></i> Add / Edit Space</button>
                </li>
                <li class="sidebar-item" onclick="window.location.href='admin.html'">
                    <button><i class="fa-solid fa-house-chimney-window"></i> Live Properties</button>
                </li>
                <li class="sidebar-item" onclick="window.location.href='usermanage.html'">
                    <button><i class="fa-solid fa-users-gear"></i> Manage Users</button>
                </li>
                <li class="sidebar-item active" onclick="window.location.href='vendormanage.html'">
                    <button><i class="fa-solid fa-user-tie"></i> Manage Vendors</button>
                </li>
                <li class="sidebar-item" onclick="window.location.href='analytics.html'">
                    <button><i class="fa-solid fa-chart-pie"></i> Traffic Analytics</button>
                </li>
                <li class="sidebar-item" onclick="window.location.href='admin.html'">
                    <button><i class="fa-solid fa-inbox"></i> Inquiries Inbox</button>
                </li>
            </ul>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="main-content">
            <div class="content-header-flex" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <div>
                    <h1>Partner Vendors Management Matrix</h1>
                    <p>Monitor vendor accounts, toggle block restrictions, track portfolio listing timestamps, and send direct alerts.</p>
                </div>
                <div>
                    <span id="total-vendors-count" style="background:var(--mehrum); color:white; padding:6px 14px; border-radius:8px; font-weight:700; font-size:13px;">Total Vendors: 0</span>
                </div>
            </div>

            <!-- Vendors Cards Grid Viewport -->
            <div class="vendor-card-grid" id="vendors-terminal-grid">
                <div style="text-align:center; color:var(--text-muted); padding:40px; grid-column:1/-1;">Syncing registered vendor database records...</div>
            </div>
        </main>
    </div>

    <!-- Modal View for Vendor Properties & Posted Dates -->
    <div class="modal-overlay" id="vendorPropertiesModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="modal-vendor-title" style="font-size:18px; font-weight:800;">Vendor Properties Portfolio</h3>
                <button type="button" onclick="closeVendorPropertiesModal()" style="background:none; border:none; font-size:18px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-properties-list-container">
                <!-- Populated via JS -->
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation Bar -->
    <nav class="mobile-nav">
        <button class="mobile-nav-item" onclick="window.location.href='admin.html'">
            <i class="fa-solid fa-circle-plus"></i>
            <span>Add Space</span>
        </button>
        <button class="mobile-nav-item" onclick="window.location.href='usermanage.html'">
            <i class="fa-solid fa-users-gear"></i>
            <span>Users</span>
        </button>
        <button class="mobile-nav-item active" onclick="window.location.href='vendormanage.html'">
            <i class="fa-solid fa-user-tie"></i>
            <span>Vendors</span>
        </button>
        <button class="mobile-nav-item" onclick="window.location.href='analytics.html'">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Analytics</span>
        </button>
    </nav>

    <!-- Firebase SDK Scripts (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCcStFHPf5AOCZgqMCWq9T7nd4lFXAcA8M",
          authDomain: "stay100-31316.firebaseapp.com",
          databaseURL: "https://stay100-31316-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "stay100-31316",
          storageBucket: "stay100-31316.firebasestorage.app",
          messagingSenderId: "91816784620",
          appId: "1:91816784620:web:45cbf9baa3808fc580ebc9",
          measurementId: "G-4J40FKKDNT"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let globalVendorsData = {};
        let globalPropertiesData = {};

        // Fetch properties & vendors in real-time
        db.ref('properties').on('value', (propSnap) => {
            globalPropertiesData = propSnap.val() || {};
            syncVendorsTerminal();
        });

        db.ref('vendors').on('value', (vendorSnap) => {
            globalVendorsData = vendorSnap.val() || {};
            syncVendorsTerminal();
        });

        function syncVendorsTerminal() {
            const gridContainer = document.getElementById('vendors-terminal-grid');
            const vendorKeys = Object.keys(globalVendorsData);
            
            document.getElementById('total-vendors-count').innerText = `Total Vendors: ${vendorKeys.length}`;

            if(vendorKeys.length === 0) {
                gridContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:40px; grid-column:1/-1;">No registered vendors found in database.</div>`;
                return;
            }

            gridContainer.innerHTML = "";
            vendorKeys.forEach(uid => {
                const vendor = globalVendorsData[uid];
                const isBlocked = vendor.isBlocked === true;

                // Calculate properties listed by this vendor and find last listing timestamp
                let vendorPropertiesCount = 0;
                let lastListingTimestamp = "No Listings";
                let propertyTimestamps = [];

                Object.keys(globalPropertiesData).forEach(propId => {
                    const prop = globalPropertiesData[propId];
                    // Match by vendor uid or owner phone/email depending on schema node structure
                    if(prop.vendorUid === uid || prop.ownerPhone === vendor.contactDetails?.phone) {
                        vendorPropertiesCount++;
                        if(prop.createdTimestamp || prop.timestamp) {
                            propertyTimestamps.push(Number(prop.createdTimestamp || prop.timestamp));
                        }
                    }
                });

                if(propertyTimestamps.length > 0) {
                    propertyTimestamps.sort((a,b) => b - a);
                    lastListingTimestamp = new Date(propertyTimestamps[0]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                }

                gridContainer.innerHTML += `
                    <div class="vendor-item-card ${isBlocked ? 'blocked-vendor' : ''}">
                        <div>
                            <div class="vendor-header-flex">
                                <img src="${vendor.profileImage || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="vendor-avatar" alt="Avatar">
                                <div class="vendor-info">
                                    <h3>${vendor.displayName || 'Unnamed Partner'}</h3>
                                    <p>${vendor.businessProfile?.agencyTitle || 'Independent Agent'}</p>
                                </div>
                                <div style="margin-left:auto;">
                                    <span class="badge-status ${isBlocked ? 'badge-blocked' : 'badge-active'}">${isBlocked ? 'BLOCKED' : 'ACTIVE'}</span>
                                </div>
                            </div>

                            <div class="vendor-meta-box">
                                <div class="vendor-meta-row">
                                    <span style="color:var(--text-muted);">Email:</span>
                                    <strong>${vendor.contactDetails?.email || 'N/A'}</strong>
                                </div>
                                <div class="vendor-meta-row">
                                    <span style="color:var(--text-muted);">Phone:</span>
                                    <strong>${vendor.contactDetails?.phone || 'N/A'}</strong>
                                </div>
                                <div class="vendor-meta-row">
                                    <span style="color:var(--text-muted);">City / Locality:</span>
                                    <span>${vendor.businessProfile?.baseCity || 'Jaipur'}</span>
                                </div>
                                <div class="vendor-meta-row" style="border-top:1px solid #e2e8f0; margin-top:6px; padding-top:6px; cursor:pointer;" onclick="openVendorPropertiesModal('${uid}', '${vendor.displayName}')">
                                    <span style="color:var(--mehrum); font-weight:700;"><i class="fa-solid fa-house"></i> Total Listed Spaces:</span>
                                    <strong style="background:var(--mehrum); color:white; padding:1px 6px; border-radius:4px;">${vendorPropertiesCount} View</strong>
                                </div>
                                <div class="vendor-meta-row">
                                    <span style="color:var(--text-muted);">Last Property Posted:</span>
                                    <span style="font-weight:600;">${lastListingTimestamp}</span>
                                </div>
                            </div>
                        </div>

                        <div class="vendor-actions-group">
                            <button type="button" class="btn-action ${isBlocked ? 'btn-block-action unblock' : 'btn-block-action'}" onclick="toggleVendorBlockStatus('${uid}', ${!isBlocked})">
                                <i class="fa-solid ${isBlocked ? 'fa-user-check' : 'fa-ban'}"></i> ${isBlocked ? 'Unblock' : 'Block'}
                            </button>
                            <button type="button" class="btn-action btn-whatsapp" onclick="sendWhatsAppNotification('${vendor.contactDetails?.phone}', '${vendor.displayName}')">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp
                            </button>
                            <button type="button" class="btn-action btn-email" onclick="sendEmailNotification('${vendor.contactDetails?.email}')">
                                <i class="fa-solid fa-envelope"></i> Email
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Toggle Block / Unblock Vendor & hide/show properties accordingly
        window.toggleVendorBlockStatus = function(vendorUid, shouldBlock) {
            const actionText = shouldBlock ? "block" : "unblock";
            if(confirm(`Are you sure you want to ${actionText} this vendor?`)) {
                // 1. Update vendor node block status flag
                db.ref(`vendors/${vendorUid}`).update({ isBlocked: shouldBlock })
                    .then(() => {
                        // 2. Automatically hide or show all properties belonging to this vendor
                        const updates = {};
                        Object.keys(globalPropertiesData).forEach(propId => {
                            const prop = globalPropertiesData[propId];
                            const vendor = globalVendorsData[vendorUid];
                            if(prop.vendorUid === vendorUid || prop.ownerPhone === vendor?.contactDetails?.phone) {
                                // If vendor is blocked, set isHidden / hidden flag or active status to false
                                updates[`properties/${propId}/isHiddenByAdmin`] = shouldBlock;
                            }
                        });
                        return db.ref().update(updates);
                    })
                    .then(() => {
                        alert(`Vendor successfully ${actionText}ed. Properties visibility updated.`);
                    })
                    .catch(err => alert("Error processing action: " + err.message));
            }
        };

        // Direct WhatsApp Notification Sender
        window.sendWhatsAppNotification = function(phone, vendorName) {
            if(!phone) {
                alert("Vendor phone number not available.");
                return;
            }
            let cleanPhone = phone.replace(/\D/g, '');
            if(!cleanPhone.startsWith('91')) cleanPhone = '91' + cleanPhone;
            const message = encodeURIComponent(`Hello ${vendorName}, this is an official notification from StayPremium Administration regarding your partner account.`);
            window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
        };

        // Direct Email Notification Sender
        window.sendEmailNotification = function(email) {
            if(!email) {
                alert("Vendor email address not available.");
                return;
            }
            window.location.href = `mailto:${email}?subject=StayPremium Partner Network Update&body=Dear Partner,%0D%0A%0D%0AWe are writing to you regarding your listing account on StayPremium.`;
        };

        // Open Modal to show detailed vendor properties with posted dates
        window.openVendorPropertiesModal = function(vendorUid, vendorName) {
            document.getElementById('modal-vendor-title').innerText = `${vendorName}'s Properties Portfolio`;
            const container = document.getElementById('modal-properties-list-container');
            
            let matchedProps = [];
            Object.keys(globalPropertiesData).forEach(propId => {
                const prop = globalPropertiesData[propId];
                const vendor = globalVendorsData[vendorUid];
                if(prop.vendorUid === vendorUid || prop.ownerPhone === vendor?.contactDetails?.phone) {
                    matchedProps.push(prop);
                }
            });

            if(matchedProps.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px;">No properties posted by this vendor yet.</div>`;
            } else {
                container.innerHTML = "";
                matchedProps.forEach((prop, index) => {
                    const postedDateRaw = prop.createdTimestamp || prop.timestamp;
                    const formattedDate = postedDateRaw ? new Date(postedDateRaw).toLocaleString() : 'Date not recorded';
                    container.innerHTML += `
                        <div style="border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background:#f8fafc;">
                            <div>
                                <h4 style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:2px;">${index + 1}. ${prop.name || prop.title || 'Untitled Space'}</h4>
                                <p style="font-size:12px; color:var(--text-muted);">Locality: ${prop.area || prop.city || 'N/A'} | Rent: ₹${prop.price || prop.monthlyRent || 0}</p>
                                <p style="font-size:11px; color:var(--mehrum); margin-top:4px;"><i class="fa-solid fa-calendar-days"></i> Posted On: <strong>${formattedDate}</strong></p>
                            </div>
                            <div>
                                <span style="font-size:11px; font-weight:700; padding:4px 8px; border-radius:4px; background:${prop.isHiddenByAdmin ? '#fee2e2' : '#d1fae5'}; color:${prop.isHiddenByAdmin ? '#dc2626' : '#059669'};">
                                    ${prop.isHiddenByAdmin ? 'Hidden (Blocked)' : 'Live'}
                                </span>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('vendorPropertiesModal').style.display = 'flex';
        };

        window.closeVendorPropertiesModal = function() {
            document.getElementById('vendorPropertiesModal').style.display = 'none';
        };
    </script>
</body>
</html>
